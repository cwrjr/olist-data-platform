version: 2

models:
  - name: gold_category_performance
    description: "Product category performance analysis with merchandise revenue, unit economics, freight costs, and review scores."
    columns:
      - name: category_name
        description: "English product category name (with Portuguese fallback)."
        tests:
          - unique
          - not_null
      - name: total_category_revenue
        description: "Total revenue generated by the product category."
        tests:
          - not_null
