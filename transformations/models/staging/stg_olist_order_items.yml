version: 2

models:
  - name: stg_olist_order_items
    description: "Staged order items table with item pricing, freight, and seller mapping."
    columns:
      - name: order_key
        description: "Foreign key linking to the order."
        tests:
          - not_null
      - name: order_item_id
        description: "Sequential number identifying the line item within the order."
        tests:
          - not_null
      - name: product_key
        description: "Foreign key linking to the product."
        tests:
          - not_null
      - name: seller_key
        description: "Foreign key linking to the seller."
        tests:
          - not_null
      - name: price
        description: "Item price."
        tests:
          - not_null
